name: ساخت APK انگور

on:
  workflow_dispatch:
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: angoor-android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ساخت APK و ثبت گزارش کامل
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: دریافت پروژه
        uses: actions/checkout@v4

      - name: نصب Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: اعتبارسنجی ساختار، XML و JavaScript
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/validate_project.py

      - name: نصب Android SDK 36
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager)"
          fi
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: اعتبارسنجی Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: آماده‌سازی امضای اختیاری Release
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANGOOR_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANGOOR_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANGOOR_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANGOOR_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "${KEYSTORE_BASE64:-}" ] && [ -n "${KEYSTORE_PASSWORD:-}" ] && [ -n "${KEY_ALIAS:-}" ] && [ -n "${KEY_PASSWORD:-}" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/angoor-release.jks"
            echo "ANGOOR_KEYSTORE_FILE=$RUNNER_TEMP/angoor-release.jks" >> "$GITHUB_ENV"
            echo "BUILD_RELEASE=true" >> "$GITHUB_ENV"
          else
            echo "BUILD_RELEASE=false" >> "$GITHUB_ENV"
          fi

      - name: ساخت APK و ثبت خطای کامل
        id: gradle_build
        continue-on-error: true
        shell: bash
        env:
          ANGOOR_KEYSTORE_PASSWORD: ${{ secrets.ANGOOR_KEYSTORE_PASSWORD }}
          ANGOOR_KEY_ALIAS: ${{ secrets.ANGOOR_KEY_ALIAS }}
          ANGOOR_KEY_PASSWORD: ${{ secrets.ANGOOR_KEY_PASSWORD }}
        run: |
          set +e
          chmod +x gradlew
          if [ "${BUILD_RELEASE}" = "true" ]; then
            TASK="assembleRelease"
          else
            TASK="assembleDebug"
          fi
          ./gradlew --no-daemon --console=plain --stacktrace --info "$TASK" 2>&1 | tee gradle-build.log
          STATUS=${PIPESTATUS[0]}
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "===== ERROR SUMMARY =====" > gradle-error-summary.txt
          grep -nE "FAILURE:|What went wrong:|Caused by:|Could not|A problem occurred|error:|Exception" gradle-build.log \
            | head -n 240 >> gradle-error-summary.txt || true
          exit "$STATUS"

      - name: آماده‌سازی APK در صورت موفقیت
        if: steps.gradle_build.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${BUILD_RELEASE}" = "true" ]; then
            cp app/build/outputs/apk/release/app-release.apk Angoor.apk
          else
            cp app/build/outputs/apk/debug/app-debug.apk Angoor.apk
          fi
          ls -lh Angoor.apk

      - name: بررسی Lint بدون جلوگیری از دریافت APK
        if: steps.gradle_build.outputs.status == '0'
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          ./gradlew --no-daemon --console=plain lintDebug 2>&1 | tee gradle-lint.log

      - name: بارگذاری APK
        if: steps.gradle_build.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: Angoor-APK
          path: Angoor.apk
          if-no-files-found: error
          retention-days: 30

      - name: بارگذاری گزارش کامل ساخت
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Angoor-Build-Logs
          path: |
            gradle-build.log
            gradle-error-summary.txt
            gradle-lint.log
            app/build/reports/
          if-no-files-found: ignore
          retention-days: 14

      - name: اعلام شکست ساخت پس از ذخیره گزارش
        if: steps.gradle_build.outputs.status != '0'
        shell: bash
        run: |
          echo "ساخت APK ناموفق بود. Artifact با نام Angoor-Build-Logs را دانلود کنید."
          cat gradle-error-summary.txt || true
          exit 1
